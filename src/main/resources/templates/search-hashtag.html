<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title th:text="'#' + ${hashtag} + ' — RevConnect'">Hashtag Search</title>
</head>

<body>
    <section class="feed-dashboard">
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div class="search-shell">
                <div class="mb-6 search-hashtag-head">
                    <a th:href="@{/feed}" class="btn btn-ghost btn-sm" style="padding: 0.5rem;">
                        <i data-lucide="arrow-left" style="width: 20px;"></i>
                    </a>
                    <h1>Posts with <span class="search-hashtag-value" th:text="'#' + ${hashtag}">#hashtag</span></h1>
                </div>

                <div th:if="${posts == null or posts.empty}" class="card text-center search-empty search-hash-empty">
                    <i data-lucide="hash"
                        style="width: 56px; height: 56px; margin: 0 auto 1.5rem; color: var(--text-muted);"></i>
                    <p class="text-secondary text-lg">No posts found with this hashtag yet.</p>
                </div>

                <div th:each="post : ${posts}" class="card mb-6 feed-post search-post-card">
                    <div class="feed-post-ribbon"></div>
                    <div class="flex items-center gap-4 mb-5">
                        <div class="avatar avatar-md search-user-avatar">
                            <img th:if="${post.author.profilePicture != null and !post.author.profilePicture.isEmpty()}"
                                th:src="@{${post.author.profilePicture}}" class="search-user-avatar-img" alt="Avatar" />
                            <span th:if="${post.author.profilePicture == null or post.author.profilePicture.isEmpty()}"
                                th:text="${post.author.username.substring(0,1).toUpperCase()}" class="search-user-avatar-fallback"></span>
                        </div>
                        <div style="flex: 1;">
                            <a th:href="@{'/profile/' + ${post.author.username}}"
                                class="font-bold text-lg hover-text-primary"
                                th:text="${post.author.fullName ?: post.author.username}"></a>
                            <div class="text-xs text-secondary mt-1"
                                th:text="${#temporals.format(post.createdAt,'dd MMM yyyy')}"></div>
                        </div>
                        <div th:if="${post.postType.name() != 'TEXT'}" class="badge" th:text="${post.postType}"></div>
                    </div>

                    <div class="search-post-content" th:text="${post.content}"></div>

                    <!-- Hashtag tags — clickable -->
                    <div class="search-hash-tags"
                        th:if="${post.hashtags != null and !#strings.isEmpty(post.hashtags)}">
                        <a th:each="tag : ${#strings.arraySplit(post.hashtags,',')}"
                            th:href="@{/posts/search(hashtag=${#strings.trim(tag).replace('#','')})}"
                            class="text-sm font-bold icon-sky" style="text-decoration: none;"
                            th:text="${#strings.trim(tag).startsWith('#') ? #strings.trim(tag) : '#' + #strings.trim(tag)}"></a>
                    </div>

                    <div class="search-post-footer">
                        <a th:href="@{'/posts/' + ${post.id}}" class="btn btn-outline btn-sm">View Full Post</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
