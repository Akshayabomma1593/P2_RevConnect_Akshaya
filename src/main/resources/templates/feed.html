<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Activity Feed - RevConnect</title>
</head>

<body>
    <section class="feed-dashboard">
        <div class="container main-content feed-main-grid">
            <aside class="sidebar-left feed-identity-rail">
                <div class="card rc-profile-card mb-6">
                    <div class="rc-profile-cover"></div>
                    <div class="rc-profile-main">
                        <div class="avatar avatar-md border-4 border-white mb-3" style="overflow: hidden;">
                            <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
                                th:src="@{${currentUser.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;"
                                alt="" />
                            <span th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
                                th:text="${currentUser.username.substring(0,1).toUpperCase()}"
                                style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg-soft); color: var(--text-secondary); border: 2px solid var(--border-light);"></span>
                        </div>
                        <h4 class="font-bold" th:text="${currentUser.fullName ?: currentUser.username}"></h4>
                        <p class="text-xs text-secondary mb-4" th:text="'@' + ${currentUser.username}"></p>
                        <div class="rc-profile-stats">
                            <div>
                                <strong th:text="${followerCount ?: 0}">0</strong>
                                <span>Following</span>
                            </div>
                            <div>
                                <strong th:text="${connectionCount ?: 0}">0</strong>
                                <span>Network</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-6">
                    <div class="widget-title">Workspace</div>
                    <div class="feed-shortcuts">
                        <a th:href="@{/analytics}" class="nav-link py-2 px-1 text-sm inline-flex items-center gap-2">
                            <i data-lucide="line-chart" class="icon-mint" style="width: 16px;"></i>
                            <span>Insights</span>
                        </a>
                        <a th:href="@{/profile/edit}" class="nav-link py-2 px-1 text-sm inline-flex items-center gap-2">
                            <i data-lucide="settings" class="icon-peach" style="width: 16px;"></i>
                            <span>Edit Profile</span>
                        </a>
                        <a th:href="@{/connections}" class="nav-link py-2 px-1 text-sm inline-flex items-center gap-2">
                            <i data-lucide="users" class="icon-sky" style="width: 16px;"></i>
                            <span>My Network</span>
                        </a>
                    </div>
                </div>
            </aside>

            <div class="feed-column">
                <div class="card rc-composer feed-composer-shell mb-8">
                    <form th:action="@{/feed/post}" method="post" id="postForm" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="flex gap-4">
                            <div class="avatar" style="overflow: hidden;">
                                <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
                                    th:src="@{${currentUser.profilePicture}}"
                                    style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                                <span
                                    th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
                                    th:text="${currentUser.username.substring(0,1).toUpperCase()}"
                                    style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg-soft); color: var(--text-secondary);"></span>
                            </div>
                            <div class="w-full">
                                <textarea name="content" id="postContent"
                                    class="form-control border-none shadow-none px-0 py-2 mb-2"
                                    style="resize: none; font-size: 1.15rem; font-weight: 400;"
                                    placeholder="What are you building today?" required></textarea>

                                <div id="imagePreviewContainer"
                                    style="display: none; position: relative; margin-bottom: 1rem; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);">
                                    <img id="imagePreview" src="#" style="width: 100%; max-height: 400px; object-fit: cover;" />
                                    <button type="button" id="removeImgBtn"
                                        style="position: absolute; top: 10px; right: 10px; background: rgba(17,24,39,0.65); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer;">
                                        <i data-lucide="x" style="width: 16px;"></i>
                                    </button>
                                </div>

                                <div id="hashtagRow" style="display: none; margin-bottom: 0.75rem;">
                                    <input type="text" name="hashtags" id="hashtagInput" class="form-control"
                                        style="font-size: 0.875rem; border-style: dashed;"
                                        placeholder="e.g. spring, product, startup (comma-separated)" />
                                </div>

                                <div th:if="${currentUser.role.name() != 'PERSONAL'}" class="rc-business-wrap mb-3">
                                    <button type="button" class="btn btn-ghost btn-sm" id="toggleBusinessFields">
                                        <i data-lucide="briefcase" style="width: 16px;"></i>
                                        <span>Business options</span>
                                    </button>

                                    <div id="businessFields" style="display: none; margin-top: 0.75rem;">
                                        <div class="rc-grid-two">
                                            <div>
                                                <label for="postType" class="text-xs text-muted block mb-2">Post type</label>
                                                <select id="postType" name="postType" class="form-control"
                                                    style="font-size: 0.875rem;">
                                                    <option value="REGULAR">Regular post</option>
                                                    <option value="PROMOTIONAL">Promotional</option>
                                                    <option value="ANNOUNCEMENT">Announcement</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label for="scheduledAt" class="text-xs text-muted block mb-2">Schedule
                                                    (optional)</label>
                                                <input id="scheduledAt" type="datetime-local" name="scheduledAt"
                                                    class="form-control" style="font-size: 0.875rem;" />
                                            </div>
                                        </div>

                                        <div id="ctaFields" class="rc-grid-two" style="display: none; margin-top: 0.75rem;">
                                            <div>
                                                <label for="ctaLabel" class="text-xs text-muted block mb-2">CTA label</label>
                                                <input id="ctaLabel" type="text" name="ctaLabel" class="form-control"
                                                    placeholder="Example: Learn More" style="font-size: 0.875rem;" />
                                            </div>
                                            <div>
                                                <label for="ctaUrl" class="text-xs text-muted block mb-2">CTA URL</label>
                                                <input id="ctaUrl" type="url" name="ctaUrl" class="form-control"
                                                    placeholder="https://example.com" style="font-size: 0.875rem;" />
                                            </div>
                                        </div>

                                        <div class="mt-4">
                                            <label for="productTags" class="text-xs text-muted block mb-2">Product/Service tags</label>
                                            <input id="productTags" type="text" name="productTags" class="form-control"
                                                placeholder="e.g. Resume Review, UI Kit, Mentorship" style="font-size: 0.875rem;" />
                                        </div>

                                        <div class="mt-4" th:if="${ownedProducts != null and !ownedProducts.isEmpty()}">
                                            <label class="text-xs text-muted block mb-2">Tag products/services from catalog</label>
                                            <div class="flex flex-direction-column gap-2">
                                                <label th:each="prod : ${ownedProducts}" class="text-xs text-muted"
                                                    style="display: flex; align-items: center; gap: 0.5rem;">
                                                    <input type="checkbox" name="productIds" th:value="${prod.id}" />
                                                    <span th:text="${prod.name}">Product</span>
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mt-4">
                                            <label class="text-xs text-muted" style="display: flex; align-items: center; gap: 0.5rem;">
                                                <input type="checkbox" name="pinned" />
                                                Pin this post to my profile
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                                    <div class="flex gap-3">
                                        <input type="file" name="image" id="imageInput" accept="image/*"
                                            style="display: none;" />
                                        <button type="button" id="imgBtn" class="btn btn-ghost btn-sm" title="Upload image">
                                            <i data-lucide="image" class="icon-sky" style="width: 18px;"></i>
                                        </button>
                                        <button type="button" id="hashBtn" class="btn btn-ghost btn-sm" title="Add hashtags">
                                            <i data-lucide="hash" class="icon-lavender" style="width: 18px;"></i>
                                        </button>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Publish</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <div th:if="${posts == null or posts.empty}" class="card text-center py-16">
                    <i data-lucide="message-square" class="text-muted mx-auto mb-4" style="width: 40px; height: 40px;"></i>
                    <p class="text-secondary">No posts yet. Start your first conversation.</p>
                </div>

                <div class="feed-stream">
                    <div th:each="post : ${posts}" class="card mb-6 post feed-post shadow-sm">
                        <div class="feed-post-ribbon"></div>
                        <div class="post-header">
                            <div class="avatar" style="overflow: hidden;">
                                <img th:if="${post.author.profilePicture != null && !post.author.profilePicture.isEmpty()}"
                                    th:src="@{${post.author.profilePicture}}"
                                    style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                                <span th:if="${post.author.profilePicture == null || post.author.profilePicture.isEmpty()}"
                                    th:text="${post.author.username.substring(0,1).toUpperCase()}"
                                    style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg-soft); color: var(--text-secondary);"></span>
                            </div>
                            <div class="post-author">
                                <a th:href="@{'/profile/' + ${post.author.username}}" class="author-name hover:text-primary"
                                    th:text="${post.author.fullName ?: post.author.username}"></a>
                                <span class="post-time" th:text="${#temporals.format(post.createdAt,'dd MMM, HH:mm')}"></span>
                            </div>
                            <div th:if="${post.author.id == currentUser.id}" style="margin-left: auto;">
                                <form th:action="@{'/posts/' + ${post.id} + '/delete'}" method="post"
                                    onsubmit="return confirm('Delete this post?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger); padding: 0.25rem;">
                                        <i data-lucide="trash-2" style="width: 16px;"></i>
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div class="post-content" th:text="${post.content}"></div>

                        <div th:if="${post.imageUrl != null and !post.imageUrl.isEmpty()}" class="post-image mb-4"
                            style="border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);">
                            <img th:src="@{${post.imageUrl}}"
                                style="width: 100%; max-height: 500px; object-fit: cover; display: block;"
                                alt="Post content image" />
                        </div>

                        <div class="flex gap-3" th:if="${post.hashtags != null and !#strings.isEmpty(post.hashtags)}">
                            <a th:each="tag : ${#strings.arraySplit(post.hashtags,',')}"
                                th:href="@{/posts/search(hashtag=${#strings.trim(tag).replace('#','')})}"
                                class="text-xs font-bold icon-sky" style="text-decoration: none; cursor: pointer;"
                                th:text="${#strings.trim(tag).startsWith('#') ? #strings.trim(tag) : '#' + #strings.trim(tag)}"></a>
                        </div>

                        <div class="flex gap-2 mt-1" th:if="${post.productTags != null and !#strings.isEmpty(post.productTags)}">
                            <span th:each="pt : ${#strings.arraySplit(post.productTags,',')}" class="badge"
                                th:text="${#strings.trim(pt)}">Service</span>
                        </div>

                        <div class="flex gap-2 mt-1" th:if="${post.taggedProducts != null and !post.taggedProducts.isEmpty()}">
                            <a th:each="prod : ${post.taggedProducts}" th:href="${prod.link}" target="_blank"
                                class="badge" style="text-decoration: none;" th:text="${prod.name}">Catalog Item</a>
                        </div>

                        <div class="post-actions">
                            <form th:action="@{'/posts/' + ${post.id} + '/like'}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="action-item">
                                    <i data-lucide="heart" class="icon-peach"></i>
                                    <span th:text="${post.likes.size()}">0</span>
                                </button>
                            </form>
                            <a th:href="@{'/posts/' + ${post.id}}" class="action-item">
                                <i data-lucide="message-circle" class="icon-sky"></i>
                                <span th:text="${post.comments.size()}">0</span>
                            </a>
                            <form th:action="@{'/posts/' + ${post.id} + '/share'}" method="post" style="margin-left: auto;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="action-item">
                                    <i data-lucide="share-2" class="icon-mint"></i>
                                    <span th:text="${post.shares.size()}">0</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div th:if="${totalPages != null and totalPages > 1}" class="flex gap-2 justify-center mt-4">
                    <a th:if="${currentPage > 0}" th:href="@{/feed(page=${currentPage - 1})}" class="btn btn-outline btn-sm">Prev</a>
                    <span class="btn btn-sm" style="cursor: default;"
                        th:text="'Page ' + ${currentPage + 1} + ' of ' + ${totalPages}"></span>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/feed(page=${currentPage + 1})}"
                        class="btn btn-outline btn-sm">Next</a>
                </div>
            </div>

            <aside class="sidebar-right feed-right-dock">
                <div class="card mb-8">
                    <div class="widget-title">Explore Network</div>
                    <form th:action="@{/profile/search}" method="get" class="mb-4">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-muted"
                                style="width: 16px;"></i>
                            <input type="text" name="q" class="form-control pl-11 text-sm bg-slate-50 border-none"
                                placeholder="Find people..." />
                        </div>
                    </form>
                </div>

                <div class="card mb-8">
                    <div class="widget-title">Quick Filters</div>
                    <div class="feed-filter-grid">
                        <a th:href="@{/feed(userType=${activeUserType})}" class="btn btn-outline btn-sm">All</a>
                        <a th:href="@{/feed(type='regular',userType=${activeUserType})}" class="btn btn-outline btn-sm">Regular</a>
                        <a th:href="@{/feed(type='promotional',userType=${activeUserType})}" class="btn btn-outline btn-sm">Promo</a>
                        <a th:href="@{/feed(type='announcement',userType=${activeUserType})}" class="btn btn-outline btn-sm">Announcements</a>
                    </div>
                </div>

                <div class="card mb-8">
                    <div class="widget-title">User Type</div>
                    <div class="feed-filter-grid">
                        <a th:href="@{/feed(type=${activeType})}" class="btn btn-outline btn-sm">All</a>
                        <a th:href="@{/feed(userType='personal',type=${activeType})}" class="btn btn-outline btn-sm">Personal</a>
                        <a th:href="@{/feed(userType='creator',type=${activeType})}" class="btn btn-outline btn-sm">Creator</a>
                        <a th:href="@{/feed(userType='business',type=${activeType})}" class="btn btn-outline btn-sm">Business</a>
                    </div>
                </div>

                <div class="card mb-8" th:if="${trending != null and !trending.empty}">
                    <div class="widget-title">Trending</div>
                    <div class="flex flex-direction-column gap-2">
                        <div th:each="tp : ${trending}" th:if="${tp.hashtags != null and !#strings.isEmpty(tp.hashtags)}">
                            <a th:each="tag : ${#strings.arraySplit(tp.hashtags,',')}"
                                th:href="@{/posts/search(hashtag=${#strings.trim(tag).replace('#','')})}"
                                class="text-xs font-bold icon-lavender"
                                style="display: inline-block; margin-right: 0.4rem; text-decoration: none;"
                                th:text="${#strings.trim(tag).startsWith('#') ? #strings.trim(tag) : '#' + #strings.trim(tag)}">
                            </a>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </section>

    <script>
        document.getElementById("hashBtn").addEventListener("click", function () {
            var row = document.getElementById("hashtagRow");
            var isHidden = row.style.display === "none";
            row.style.display = isHidden ? "block" : "none";
            if (isHidden) {
                document.getElementById("hashtagInput").focus();
            }
        });

        const imgBtn = document.getElementById("imgBtn");
        const imageInput = document.getElementById("imageInput");
        const imagePreviewContainer = document.getElementById("imagePreviewContainer");
        const imagePreview = document.getElementById("imagePreview");
        const removeImgBtn = document.getElementById("removeImgBtn");

        imgBtn.addEventListener("click", () => imageInput.click());

        imageInput.addEventListener("change", function () {
            const file = this.files[0];
            if (!file) {
                return;
            }
            const reader = new FileReader();
            reader.onload = function (e) {
                imagePreview.src = e.target.result;
                imagePreviewContainer.style.display = "block";
            };
            reader.readAsDataURL(file);
        });

        removeImgBtn.addEventListener("click", function () {
            imageInput.value = "";
            imagePreviewContainer.style.display = "none";
            imagePreview.src = "#";
        });

        const businessToggle = document.getElementById("toggleBusinessFields");
        const businessFields = document.getElementById("businessFields");
        const postType = document.getElementById("postType");
        const ctaFields = document.getElementById("ctaFields");

        if (businessToggle && businessFields) {
            businessToggle.addEventListener("click", function () {
                const closed = businessFields.style.display === "none";
                businessFields.style.display = closed ? "block" : "none";
            });
        }

        if (postType && ctaFields) {
            const updateCtaVisibility = function () {
                const isPromotional = postType.value === "PROMOTIONAL";
                ctaFields.style.display = isPromotional ? "grid" : "none";
            };
            postType.addEventListener("change", updateCtaVisibility);
            updateCtaVisibility();
        }
    </script>
</body>

</html>
