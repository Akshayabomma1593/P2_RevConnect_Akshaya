<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Search Results — RevConnect</title>
</head>

<body>
    <section class="feed-dashboard">
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div class="search-shell">
                <div class="mb-6">
                    <h1>Global Search</h1>
                    <p class="text-secondary text-sm mt-1" th:text="'Results for: ' + ${query}"></p>
                </div>

                <div th:if="${results.empty}" class="card text-center search-empty">
                    <i data-lucide="search-x"
                        style="width: 48px; height: 48px; margin: 0 auto 1rem; color: var(--text-muted);"></i>
                    <p class="text-secondary">No matching results found.</p>
                </div>

                <div th:each="user : ${results}" class="card mb-2 flex items-center gap-4 search-user-card">
                    <div class="search-user-avatar avatar">
                        <img th:if="${user.profilePicture != null}" th:src="${user.profilePicture}"
                            class="search-user-avatar-img" alt="Avatar" />
                        <span th:if="${user.profilePicture == null}"
                            th:text="${user.username.substring(0,1).toUpperCase()}" class="search-user-avatar-fallback"></span>
                    </div>
                    <div class="search-user-main">
                        <a th:href="@{'/profile/' + ${user.username}}" class="font-bold hover:text-primary"
                            th:text="${user.fullName ?: user.username}"></a>
                        <div class="text-xs text-secondary" th:text="'@' + ${user.username}"></div>
                        <p class="text-xs text-muted mt-2" th:if="${user.bio}"
                            th:text="${user.bio.length() > 100 ? user.bio.substring(0,100) + '...' : user.bio}"></p>
                    </div>
                    <div class="flex flex-direction-column gap-2 items-end search-user-actions">
                        <span th:if="${user.role.name() != 'PERSONAL'}" class="badge mb-2"
                            th:text="${user.role}"></span>
                        <a th:href="@{'/profile/' + ${user.username}}" class="btn btn-outline btn-sm">View Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
