<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - RevConnect</title>
    <script>
        (function () {
            var savedTheme = localStorage.getItem("theme");
            var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            var theme = savedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <button type="button" class="rc-theme-toggle rc-theme-floating" data-theme-toggle>Dark</button>

    <div class="auth-shell auth-shell-simple">
        <div class="auth-card auth-card-shell">
            <div class="text-center">
                <div class="auth-logo">
                    <span>RevConnect</span>
                </div>
                <p class="auth-tagline">Reset your password with token</p>
            </div>

            <div class="alert alert-error" th:if="${errorMessage}">
                <i data-lucide="alert-circle" style="width: 18px;"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label class="form-label" for="token">Reset Token</label>
                    <input type="text" id="token" name="token" class="form-control" th:value="${token}" required />
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <input type="password" id="password" name="password" class="form-control" minlength="6" required />
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                        minlength="6" required />
                </div>

                <button type="submit" class="btn btn-primary btn-full mt-4">
                    <i data-lucide="shield-check" style="width: 18px; margin-right: 0.5rem;"></i>
                    Reset Password
                </button>
            </form>

            <p class="text-center text-sm text-secondary mt-4">
                Need a token?
                <a th:href="@{/forgot-password}" class="font-bold icon-sky" style="font-weight: 600;">Generate one</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
