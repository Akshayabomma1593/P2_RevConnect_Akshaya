<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - RevConnect</title>
    <script>
        (function () {
            var savedTheme = localStorage.getItem("theme");
            var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            var theme = savedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <button type="button" class="rc-theme-toggle rc-theme-floating" data-theme-toggle>Dark</button>

    <div class="auth-shell auth-shell-simple">
        <div class="auth-card auth-card-shell">
            <div class="text-center">
                <div class="auth-logo">
                    <span>RevConnect</span>
                </div>
                <p class="auth-tagline">Generate a password reset token</p>
            </div>

            <div class="alert alert-error" th:if="${errorMessage}">
                <i data-lucide="alert-circle" style="width: 18px;"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="alert alert-success" th:if="${successMessage}">
                <i data-lucide="check-circle" style="width: 18px;"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label class="form-label" for="usernameOrEmail">Username or Email</label>
                    <input type="text" id="usernameOrEmail" name="usernameOrEmail" class="form-control"
                        th:value="${usernameOrEmail}" placeholder="Enter your username or email" required />
                </div>

                <button type="submit" class="btn btn-primary btn-full mt-4">
                    <i data-lucide="key-round" style="width: 18px; margin-right: 0.5rem;"></i>
                    Generate Token
                </button>
            </form>

            <div class="form-group mt-4" th:if="${resetToken}">
                <label class="form-label" for="resetToken">Your Reset Token</label>
                <input id="resetToken" class="form-control" type="text" th:value="${resetToken}" readonly />
                <small class="text-muted text-xs">Copy this token and use it on the reset password page.</small>
            </div>

            <p class="text-center text-sm text-secondary mt-4">
                Ready to reset?
                <a th:href="@{/reset-password}" class="font-bold icon-sky" style="font-weight: 600;">Open Reset
                    Password</a>
            </p>

            <p class="text-center text-sm text-secondary mt-4">
                Back to login?
                <a th:href="@{/login}" class="font-bold icon-sky" style="font-weight: 600;">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
