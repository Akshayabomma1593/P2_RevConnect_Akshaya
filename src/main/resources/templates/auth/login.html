<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In - RevConnect</title>
    <script>
        (function () {
            var savedTheme = localStorage.getItem("theme");
            var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            var theme = savedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <button type="button" class="rc-theme-toggle rc-theme-floating" data-theme-toggle>Dark</button>

    <div class="auth-shell auth-shell-simple">
        <div class="auth-card auth-card-shell">
            <div class="text-center">
                <div class="auth-logo">
                    <span>RevConnect</span>
                </div>
                <p class="auth-tagline">Sign in to your account</p>
            </div>

            <div class="alert alert-error" th:if="${param.error != null or errorMessage != null}"
                style="margin-bottom: 1rem; text-align: left;">
                <i data-lucide="alert-circle" style="width: 18px;"></i>
                <span th:text="${errorMessage ?: 'Invalid username or password.'}"></span>
            </div>

            <div class="alert alert-success" th:if="${param.logout != null or successMessage != null}"
                style="margin-bottom: 1rem; text-align: left;">
                <i data-lucide="check-circle" style="width: 18px;"></i>
                <span th:text="${successMessage ?: 'You have been logged out successfully.'}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label class="form-label" for="usernameOrEmail">Username or Email</label>
                    <input type="text" id="usernameOrEmail" name="usernameOrEmail" class="form-control"
                        placeholder="Enter your username or email" required autofocus />
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" required />
                </div>

                <button type="submit" class="btn btn-primary btn-full mt-4">
                    <i data-lucide="log-in" style="width: 18px; margin-right: 0.5rem;"></i>
                    Log In
                </button>
            </form>

            <p class="text-center text-sm text-secondary mt-4">
                Don't have an account?
                <a th:href="@{/register}" class="font-bold icon-sky" style="font-weight: 600;">Create one now</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
