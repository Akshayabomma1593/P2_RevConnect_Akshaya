<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - RevConnect</title>
    <script>
        (function () {
            var savedTheme = localStorage.getItem("theme");
            var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            var theme = savedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <button type="button" class="rc-theme-toggle rc-theme-floating" data-theme-toggle>Dark</button>

    <div class="auth-shell auth-shell-simple auth-shell-register">
        <div class="auth-card auth-card-shell auth-register-card">
            <div class="text-center">
                <div class="auth-logo">
                    <span>RevConnect</span>
                </div>
                <p class="auth-tagline">Create your account</p>
            </div>

            <div class="alert alert-error" th:if="${errorMessage}">
                <i data-lucide="alert-circle" style="width: 18px;"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="alert alert-error" th:if="${#fields.hasErrors('*')}" th:each="err : ${#fields.allErrors()}"
                th:text="${err}">
            </div>

            <form th:action="@{/register}" th:object="${registerDTO}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="auth-grid-two">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control"
                            placeholder="John Doe" />
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="username">Username <span style="color:var(--danger);">*</span></label>
                        <input type="text" id="username" th:field="*{username}" class="form-control"
                            placeholder="johndoe" required minlength="3" maxlength="50" />
                        <small class="text-muted text-xs" th:if="${#fields.hasErrors('username')}"
                            th:errors="*{username}" style="color: var(--danger);"></small>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address <span style="color:var(--danger);">*</span></label>
                    <input type="email" id="email" th:field="*{email}" class="form-control"
                        placeholder="john@example.com" required />
                    <small class="text-muted text-xs" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                        style="color: var(--danger);"></small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password <span style="color:var(--danger);">*</span></label>
                    <input type="password" id="password" th:field="*{password}" class="form-control"
                        placeholder="Minimum 6 characters" required minlength="6" />
                    <small class="text-muted text-xs" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                        style="color: var(--danger);"></small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">Account Type</label>
                    <select id="role" th:field="*{role}" class="form-control">
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-full mt-4">
                    <i data-lucide="user-plus" style="width: 18px; margin-right: 0.5rem;"></i>
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-secondary mt-4">
                Already have an account?
                <a th:href="@{/login}" class="font-bold icon-sky" style="font-weight: 600;">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
