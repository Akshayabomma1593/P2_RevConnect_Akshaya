<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Notification Settings — RevConnect</title>
</head>

<body>
    <section class="feed-dashboard">
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div class="notifications-pref-shell">
                <div class="mb-6 search-hashtag-head">
                    <a th:href="@{/notifications}" class="btn btn-ghost btn-sm" style="padding: 0.5rem;">
                        <i data-lucide="arrow-left" style="width: 20px;"></i>
                    </a>
                    <h1>Notification Settings</h1>
                </div>

                <div class="alert alert-success notifications-pref-alert" th:if="${successMessage}"
                    th:text="${successMessage}"></div>

                <div class="card notifications-pref-card">
                    <p class="notifications-pref-copy">
                        Choose which events you want to be notified about.
                    </p>

                    <form th:action="@{/notifications/preferences}" method="post" th:object="${prefsDTO}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="notifications-pref-list">
                            <div class="checkbox-group notifications-pref-item">
                                <input type="checkbox" id="cr" th:field="*{connectionRequests}"
                                    class="notifications-pref-check" />
                                <label for="cr" class="notifications-pref-label">Connection
                                    Requests</label>
                            </div>

                            <div class="checkbox-group notifications-pref-item">
                                <input type="checkbox" id="ca" th:field="*{connectionAccepted}"
                                    class="notifications-pref-check" />
                                <label for="ca" class="notifications-pref-label">Connection
                                    Accepted</label>
                            </div>

                            <div class="checkbox-group notifications-pref-item">
                                <input type="checkbox" id="nf" th:field="*{newFollowers}"
                                    class="notifications-pref-check" />
                                <label for="nf" class="notifications-pref-label">New
                                    Followers</label>
                            </div>

                            <div class="checkbox-group notifications-pref-item">
                                <input type="checkbox" id="pl" th:field="*{postLikes}"
                                    class="notifications-pref-check" />
                                <label for="pl" class="notifications-pref-label">Post Likes</label>
                            </div>

                            <div class="checkbox-group notifications-pref-item">
                                <input type="checkbox" id="pc" th:field="*{postComments}"
                                    class="notifications-pref-check" />
                                <label for="pc" class="notifications-pref-label">Post
                                    Comments</label>
                            </div>

                            <div class="checkbox-group notifications-pref-item">
                                <input type="checkbox" id="ps" th:field="*{postShares}"
                                    class="notifications-pref-check" />
                                <label for="ps" class="notifications-pref-label">Post Shares</label>
                            </div>
                        </div>

                        <div class="notifications-pref-submit">
                            <button type="submit" class="btn btn-primary btn-full notifications-pref-save">Save
                                Settings</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
