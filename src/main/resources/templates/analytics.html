<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Analytics — RevConnect</title>
</head>

<body>
    <section class="feed-dashboard">
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div class="analytics-shell">
                <div class="mb-6">
                    <h1>Analytics Dashboard</h1>
                </div>

                <div class="analytics-kpi-grid mb-8">
                    <div class="card text-center analytics-kpi analytics-kpi-posts">
                        <div class="stat-value text-primary analytics-kpi-value" th:text="${metrics['totalPosts']}">0</div>
                        <div class="stat-label">Total Posts</div>
                    </div>
                    <div class="card text-center analytics-kpi analytics-kpi-followers">
                        <div class="stat-value text-secondary analytics-kpi-value"
                            th:text="${metrics['totalFollowers']}">0</div>
                        <div class="stat-label">Followers</div>
                    </div>
                    <div class="card text-center analytics-kpi analytics-kpi-connections">
                        <div class="stat-value analytics-kpi-value analytics-kpi-accent"
                            th:text="${metrics['totalConnections']}">0</div>
                        <div class="stat-label">Connections</div>
                    </div>
                    <div class="card text-center analytics-kpi analytics-kpi-following">
                        <div class="stat-value text-info analytics-kpi-value"
                            th:text="${metrics['totalFollowing']}">0</div>
                        <div class="stat-label">Following</div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="mb-4">Post Performance</h3>
                    <div th:if="${postAnalytics.empty}" class="text-center py-8 text-muted">
                        No post data available yet.
                    </div>

                    <div class="analytics-table-wrap" th:if="${!postAnalytics.empty}">
                        <table class="analytics-table">
                            <thead>
                                <tr>
                                    <th class="widget-title">Content</th>
                                    <th class="widget-title analytics-center">Likes</th>
                                    <th class="widget-title analytics-center">Comments</th>
                                    <th class="widget-title analytics-center">Shares</th>
                                    <th class="widget-title analytics-right">Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="pa : ${postAnalytics}">
                                    <td>
                                        <a th:href="@{'/posts/' + ${pa['postId']}}"
                                            th:text="${pa['content'].length() > 60 ? pa['content'].substring(0,60) + '...' : pa['content']}"
                                            class="font-bold hover:text-primary text-sm"></a>
                                    </td>
                                    <td class="text-sm font-bold analytics-center" th:text="${pa['likes']}">0</td>
                                    <td class="text-sm font-bold analytics-center"
                                        th:text="${pa['comments']}">0</td>
                                    <td class="text-sm font-bold analytics-center" th:text="${pa['shares']}">0</td>
                                    <td class="text-xs text-muted analytics-right"
                                        th:text="${#temporals.format(pa['createdAt'],'dd MMM yyyy')}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
