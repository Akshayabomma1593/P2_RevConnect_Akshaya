<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Notifications - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content">
            <div class="rc-notifications" style="grid-column: 1 / 3; max-width: 860px; margin: 0 auto; width: 100%;">
                <div class="rc-notifications-head">
                    <div>
                        <h1>Notifications</h1>
                        <p class="text-secondary text-sm">Track likes, comments, follows, and network updates.</p>
                    </div>
                    <div class="flex gap-2">
                        <form th:if="${notifications != null and !notifications.empty}" th:action="@{/notifications/clear}"
                            method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">
                                <i data-lucide="trash-2" style="width: 16px;"></i>
                                <span>Clear all</span>
                            </button>
                        </form>
                        <a th:href="@{/notifications/preferences}" class="btn btn-outline btn-sm">
                            <i data-lucide="settings" style="width: 16px;"></i>
                            <span>Preferences</span>
                        </a>
                    </div>
                </div>

                <div th:if="${notifications == null or notifications.empty}" class="card text-center" style="padding: 3rem;">
                    <i data-lucide="bell-off"
                        style="width: 44px; height: 44px; margin: 0 auto 1rem; color: var(--text-muted);"></i>
                    <h3 style="font-size: 1.1rem; margin-bottom: 0.5rem;">You are all caught up</h3>
                    <p class="text-secondary">New activity from your network will appear here.</p>
                </div>

                <div th:if="${notifications != null and !notifications.empty}" class="rc-notification-list">
                    <article th:each="n : ${notifications}" class="card rc-notification-item"
                        th:classappend="${!n.read ? ' rc-notification-new' : ''}">
                        <div class="rc-notification-icon">
                            <span th:switch="${n.type != null ? n.type.name() : ''}">
                                <i th:case="'CONNECTION_REQUEST'" data-lucide="user-plus" style="width: 20px;"></i>
                                <i th:case="'CONNECTION_ACCEPTED'" data-lucide="check-circle-2" style="width: 20px;"></i>
                                <i th:case="'NEW_FOLLOWER'" data-lucide="user" style="width: 20px;"></i>
                                <i th:case="'POST_LIKED'" data-lucide="heart" style="width: 20px;"></i>
                                <i th:case="'POST_COMMENTED'" data-lucide="message-circle" style="width: 20px;"></i>
                                <i th:case="'POST_SHARED'" data-lucide="repeat" style="width: 20px;"></i>
                                <i th:case="*" data-lucide="bell" style="width: 20px;"></i>
                            </span>
                        </div>

                        <div class="rc-notification-body">
                            <p class="font-bold" th:text="${n.message}">Notification message</p>
                            <span class="text-xs text-muted"
                                th:text="${n.createdAt != null ? #temporals.format(n.createdAt,'dd MMM, HH:mm') : ''}">Time</span>
                        </div>

                        <div class="flex gap-2">
                            <a th:if="${n.referenceId != null}" th:href="@{'/posts/' + ${n.referenceId}}"
                                class="btn btn-ghost btn-sm" title="Open post">
                                <i data-lucide="external-link" style="width: 16px;"></i>
                            </a>
                            <form th:if="${!n.read}" th:action="@{'/notifications/read/' + ${n.id}}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-ghost btn-sm" title="Mark read">
                                    <i data-lucide="check" style="width: 16px;"></i>
                                </button>
                            </form>
                            <form th:action="@{'/notifications/delete/' + ${n.id}}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-ghost btn-sm" title="Delete"
                                    style="color: var(--danger);">
                                    <i data-lucide="trash" style="width: 16px;"></i>
                                </button>
                            </form>
                        </div>
                    </article>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
