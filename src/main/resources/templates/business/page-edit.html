<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Manage Business Page - RevConnect</title>
</head>

<body>
    <section class="feed-dashboard">
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 900px; margin: 0 auto; width: 100%;">
                <h1 class="mb-6">Business/Creator Page</h1>

                <div class="card">
                    <form th:action="@{/business/page}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-group">
                            <label class="form-label">Page Name</label>
                            <input class="form-control" name="pageName" th:value="${page.pageName}" required />
                        </div>

                        <div class="form-group">
                            <label class="form-label">About</label>
                            <textarea class="form-control" rows="4" name="about"
                                th:text="${page.about}"></textarea>
                        </div>

                        <div class="rc-grid-two">
                            <div class="form-group">
                                <label class="form-label">Contact Email</label>
                                <input class="form-control" name="contactEmail" th:value="${page.contactEmail}" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Contact Phone</label>
                                <input class="form-control" name="contactPhone" th:value="${page.contactPhone}" />
                            </div>
                        </div>

                        <div class="rc-grid-two">
                            <div class="form-group">
                                <label class="form-label">Address</label>
                                <input class="form-control" name="address" th:value="${page.address}" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Hours</label>
                                <input class="form-control" name="hours" th:value="${page.hours}" />
                            </div>
                        </div>

                        <div class="rc-grid-two">
                            <div class="form-group">
                                <label class="form-label">Website</label>
                                <input class="form-control" name="website" th:value="${page.website}" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Social Links (comma-separated)</label>
                                <input class="form-control" name="socialLinks" th:value="${page.socialLinks}" />
                            </div>
                        </div>

                        <div class="mt-4">
                            <button class="btn btn-primary" type="submit">Save Page</button>
                            <a class="btn btn-outline" th:href="@{'/business/' + ${currentUser.username}}">View Public
                                Page</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
