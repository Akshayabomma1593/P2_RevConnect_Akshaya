<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Manage Products - RevConnect</title>
</head>

<body>
    <section class="feed-dashboard">
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 900px; margin: 0 auto; width: 100%;">
                <h1 class="mb-6">Products/Services Catalog</h1>

                <div class="card mb-6">
                    <h3 class="mb-4">Add Item</h3>
                    <form th:action="@{/products/create}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="rc-grid-two">
                            <div class="form-group">
                                <label class="form-label">Name</label>
                                <input class="form-control" name="name" required />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Price</label>
                                <input class="form-control" name="price" type="number" step="0.01" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="3" name="description"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Link</label>
                            <input class="form-control" name="link" placeholder="https://..." />
                        </div>
                        <button class="btn btn-primary" type="submit">Add to Catalog</button>
                    </form>
                </div>

                <div class="card">
                    <h3 class="mb-4">Catalog Items</h3>
                    <div th:if="${products == null or products.isEmpty()}" class="text-secondary">
                        No products/services yet.
                    </div>
                    <div th:each="p : ${products}" class="mb-4 pb-4" style="border-bottom: 1px solid var(--border-light);">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="font-bold" th:text="${p.name}">Product</div>
                                <div class="text-sm text-muted" th:text="${p.description}"></div>
                                <a th:if="${p.link != null and !p.link.isEmpty()}" th:href="${p.link}" target="_blank"
                                    class="text-xs icon-sky" th:text="${p.link}"></a>
                            </div>
                            <div class="flex items-center gap-2">
                                <span th:if="${p.price != null}" class="badge" th:text="${'$' + p.price}">$0.00</span>
                                <form th:if="${p.active}" th:action="@{'/products/' + ${p.id} + '/deactivate'}"
                                    method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button class="btn btn-outline btn-sm" type="submit">Archive</button>
                                </form>
                                <span th:if="${!p.active}" class="text-xs text-muted">Archived</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
