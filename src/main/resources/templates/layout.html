<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="layout(layout_content)">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle != null ? pageTitle + ' - RevConnect' : 'RevConnect'}">RevConnect</title>
  <script>
    (function () {
      var savedTheme = localStorage.getItem("theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = savedTheme || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest"></script>
  <link th:href="@{/css/styles.css}" rel="stylesheet" />
  <th:block th:fragment="head-extra"></th:block>
</head>

<body>
  <nav class="navbar">
    <div class="container rc-nav-wrap">
      <a th:href="@{/}" class="logo rc-logo">
        <span class="logo-text">RevConnect</span>
      </a>

      <div class="nav-menu" th:if="${currentUser != null}">
        <a th:href="@{/feed}" class="nav-link">Feed</a>
        <a th:href="@{/messages}" class="nav-link">Talk</a>
        <a th:href="@{/connections}" class="nav-link">Network</a>
        <button type="button" class="rc-theme-toggle" data-theme-toggle>Dark</button>
        <a th:href="@{/notifications}" class="nav-link" style="position: relative;">
          <i data-lucide="bell" style="width: 19px;"></i>
          <span class="badge" th:if="${unreadCount != null && unreadCount > 0}" th:text="${unreadCount}"
            style="position: absolute; top: -5px; right: -8px;"></span>
        </a>

        <div class="rc-nav-account">
          <a th:href="@{/profile}" class="avatar"
            style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600;">
            <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
              th:src="@{${currentUser.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;" alt="" />
            <span th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
              th:text="${currentUser.username.substring(0,1).toUpperCase()}"
              style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg-soft); color: var(--text-secondary);"></span>
          </a>

          <form th:action="@{/logout}" method="post" style="margin: 0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="rc-icon-btn" title="Logout">
              <i data-lucide="log-out" style="width: 18px;"></i>
            </button>
          </form>
        </div>
      </div>

      <div class="nav-menu" th:if="${currentUser == null}">
        <button type="button" class="rc-theme-toggle" data-theme-toggle>Dark</button>
        <a th:href="@{/login}" class="btn btn-ghost btn-sm">Login</a>
        <a th:href="@{/register}" class="btn btn-primary btn-sm">Join RevConnect</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4" style="padding: 0 1rem; position: relative; z-index: 100;">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
  </div>

  <div th:replace="${layout_content}"></div>

  <script>
    lucide.createIcons();
  </script>
  <script th:src="@{/js/main.js}"></script>
</body>

</html>
