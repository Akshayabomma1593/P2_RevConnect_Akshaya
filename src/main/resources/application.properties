# ================================================
# RevConnect P2 - Application Configuration
# ================================================

# Server
server.port=8083
server.servlet.context-path=/

# ================================================
# Local H2 Database (Submission Stable)
# ================================================
spring.datasource.url=jdbc:h2:file:./data/revconnectdb;MODE=Oracle;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
# ================================================
# JPA / Hibernate
# ================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# For submission stability: disable background scheduled DB jobs
spring.task.scheduling.enabled=false

# ================================================
# Thymeleaf
# ================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ================================================
# File Upload
# ================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Profile picture upload directory
app.upload.dir=uploads/profile-pictures

# ================================================
# Logging (Log4J2)
# ================================================
logging.config=classpath:log4j2.xml
